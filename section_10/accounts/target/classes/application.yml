server:
  port: 8080
spring:
  application:
    name: "accounts"
  profiles:
    active: "prod"
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import: "optional:configserver:http://localhost:8071/"

  # Enabling circuit breaker for openfeign clients using resilience4j
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  # Enable environment info
  info:
    env:
      enabled: true
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  # Enable shutdown endpoint
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true

# Eureka client setup
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

# setup info.app
# If we want to know more about any client this provides more detailed information via
# actuator endpoint
info:
  app:
    name: accounts
    description: "Eazy Bank Account Application"
    version: 1.0.0

logging:
  level:
    com.eazybytes.accounts: debug

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50.0
        wait-duration-in-open-state: 10000